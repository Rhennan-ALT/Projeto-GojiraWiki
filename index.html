<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gojira Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex flex-col">
    <header
        class="bg-black/90 p-4 flex justify-between items-center shadow-lg fixed top-0 left-0 w-full shadow-md z-50">
        <h1 class="text-2xl font-bold tracking-wide text-white">Gojira Wiki</h1>
        <nav class="flex gap-4">
            <button class="px-3 py-1 rounded-lg text-white hover:bg-gray-700 transition">Home</button>
            <button class="px-3 py-1 rounded-lg text-white hover:bg-gray-700 transition">Monsters</button>
            <button class="px-3 py-1 rounded-lg text-white hover:bg-gray-700 transition">Movies</button>
        </nav>
    </header>

    <section class="pt-20 mt-8 px-4"> 
        <img id="carrossel" src="assets/imgs/cr1.jpg" class="mx-auto w-full max-w-7xl rounded-2xl shadow-xl object-cover">
    </section>

    <section class="mt-10 px-4">
        <div id='app' class="mx-auto max-w-3xl bg-gray-800 rounded-2xl shadow-lg p-8">
        </div>
    </section>

    <footer class="mt-12 text-center text-gray-500 text-sm pb-4"> © 2026 Gojira Wiki - Projeto em desenvolvimento
    </footer>

    <script type="module" src="app.js"></script>

</body>

</html>
