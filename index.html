<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gojira Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<main class=" pt-15 max-w-6xl mx-auto px-4">

    <body class="bg-gray-900 text-white min-h-screen flex flex-col">
        <header
            class="bg-black/90 p-4 flex justify-between items-center shadow-lg fixed top-0 left-0 w-full shadow-md z-50">
            <h1 class="text-2xl font-bold tracking-wide text-white">Gojira Wiki</h1>

            <nav class="flex gap-4">
                <button id="navHome">Home</button>
                <div class="relative">
                    <button id="navMonsters">Monsters</button>
                    <div id="menu" class="hidden absolute top-full mt-2 bg-gray-800 p-2 rounded"></div>
                </div>
                <button id="navMovies">Movies</button>
            </nav>
        </header>

        <section class="pt-20 mt-8 px-4">
            <img id="carrossel" src="assets/imgs/cr1.jpg"
                class="mx-auto w-full max-w-7xl rounded-2xl shadow-xl object-cover">
        </section>

        <section class="mt-10 px-4">
            <div id='app' class="mx-auto max-w-3xl bg-gray-800 rounded-2xl shadow-lg p-8">
                <div id="app" class="mt-6"></div>
            </div>
        </section>

        <footer class="mt-12 text-center text-gray-500 text-sm pb-4"> © 2026 Gojira Wiki - Projeto em desenvolvimento
        </footer>

        <script type="module" src="app.js"></script>

    </body>
</main>

</html>
